<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>クロスメソッド™ 診断接続テスト</title>
  <style>
    :root{--navy:#071d2d;--navy2:#0b3448;--cyan:#39b9bd;--gold:#d0ab50;--paper:#f7fbfb;--ink:#173246;--muted:#637986}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP","Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 10%,rgba(57,185,189,.16),transparent 28%),radial-gradient(circle at 88% 88%,rgba(208,171,80,.13),transparent 30%),linear-gradient(145deg,#eaf4f4,#fbfdfd)}
    main{width:min(880px,calc(100% - 28px));margin:0 auto;padding:54px 0 70px}
    .panel{overflow:hidden;border:1px solid rgba(7,29,45,.1);border-radius:28px;background:rgba(255,255,255,.94);box-shadow:0 30px 80px rgba(7,29,45,.14)}
    header{padding:34px 36px;color:#fff;background:linear-gradient(135deg,var(--navy),var(--navy2))}
    .eyebrow{margin:0 0 10px;color:#8ee6e4;font-size:12px;font-weight:800;letter-spacing:.16em}
    h1{margin:0;font-size:clamp(28px,5vw,46px);line-height:1.24;letter-spacing:-.04em}
    header p:last-child{max-width:650px;margin:16px 0 0;color:#cae1e8;line-height:1.8}
    .content{padding:30px 36px 38px}
    .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px}
    .step{padding:15px;border-radius:18px;background:var(--paper);border:1px solid #dcebec}
    .step b{display:block;margin-bottom:5px;color:var(--navy);font-size:13px}
    .step span{color:var(--muted);font-size:12px;line-height:1.55}
    .actions{display:flex;flex-wrap:wrap;gap:12px}
    button{min-height:48px;padding:0 22px;border:0;border-radius:999px;font-weight:800;cursor:pointer}
    button.primary{color:#fff;background:linear-gradient(135deg,#1d9eaa,#197783)}
    button.secondary{color:var(--navy);background:#fff;border:1px solid #cddfe2}
    button:disabled{opacity:.55;cursor:wait}
    .result{display:none;margin-top:24px;padding:20px;border-radius:18px;border:1px solid #d9e8ea;background:#f8fbfb}
    .result.show{display:block}.result.ok{border-color:#8ad6c7;background:#f0fbf7}.result.ng{border-color:#e3a5ae;background:#fff4f5}
    .result h2{margin:0 0 9px;font-size:18px}.result p{margin:0;color:var(--muted);line-height:1.75}
    dl{display:grid;grid-template-columns:160px 1fr;gap:7px 12px;margin:16px 0 0;font-size:13px}
    dt{font-weight:800;color:var(--navy)}dd{margin:0;overflow-wrap:anywhere}
    .note{margin:26px 0 0;padding-top:20px;border-top:1px solid #e1ebec;color:var(--muted);font-size:12px;line-height:1.75}
    @media(max-width:640px){main{padding-top:20px}.panel{border-radius:22px}header,.content{padding:26px 20px}.steps{grid-template-columns:1fr}button{width:100%}dl{grid-template-columns:1fr;gap:3px}dd{margin-bottom:8px}}
  </style>
</head>
<body>
<main>
  <section class="panel">
    <header>
      <p class="eyebrow">DIAGNOSIS CONNECTION LAB</p>
      <h1>HP ⇄ GAS<br>接続確認</h1>
      <p>既存の本番診断には影響を与えず、独自ドメインから本番診断管理スプレッドシートを読み取れるかだけを確認します。</p>
    </header>
    <div class="content">
      <div class="steps">
        <div class="step"><b>1．HP</b><span>このテスト画面から送信</span></div>
        <div class="step"><b>2．Xserver</b><span>PHPが秘密情報を付けて中継</span></div>
        <div class="step"><b>3．GAS</b><span>本番シートを読み取り結果を返す</span></div>
      </div>
      <div class="actions">
        <button type="button" class="primary" id="pingButton">接続確認を実行</button>
        <button type="button" class="secondary" id="runtimeButton">人間OSデータを確認</button>
      </div>
      <div class="result" id="result" aria-live="polite"></div>
      <p class="note">この段階では回答保存・企業登録・集計・PDF作成を行いません。読み取り疎通だけを確認する安全なテストです。</p>
    </div>
  </section>
</main>
<script>
  const endpoint = '/api-lab/diagnosis.php';
  const result = document.getElementById('result');
  const buttons = [document.getElementById('pingButton'), document.getElementById('runtimeButton')];

  document.getElementById('pingButton').addEventListener('click', () => runTest({action:'ping'}));
  document.getElementById('runtimeButton').addEventListener('click', () => runTest({action:'runtime_summary', diagnosis_id:'human_os'}));

  async function runTest(payload){
    buttons.forEach(button => button.disabled = true);
    showResult('通信しています…', 'HPからXserver、GASへ接続しています。', null);
    try{
      const response = await fetch(endpoint, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload),
        cache:'no-store'
      });
      const text = await response.text();
      let data;
      try{ data = JSON.parse(text); }
      catch(_){ throw new Error('JSONではない応答です：' + text.slice(0,180)); }
      if(!response.ok || !data.ok) throw new Error(data.message || '接続に失敗しました。');
      showResult('接続成功', data.message || '正常に接続できました。', data);
    }catch(error){
      showResult('接続できませんでした', error.message || String(error), {ok:false});
    }finally{
      buttons.forEach(button => button.disabled = false);
    }
  }

  function showResult(title, message, data){
    result.className = 'result show ' + (data && data.ok === false ? 'ng' : data && data.ok ? 'ok' : '');
    const entries = data ? Object.entries(data).filter(([key]) => !['ok','message'].includes(key)) : [];
    result.innerHTML = `<h2>${escapeHtml(title)}</h2><p>${escapeHtml(message)}</p>` +
      (entries.length ? `<dl>${entries.map(([key,value]) => `<dt>${escapeHtml(key)}</dt><dd>${escapeHtml(String(value))}</dd>`).join('')}</dl>` : '');
  }

  function escapeHtml(value){
    return String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
  }
</script>
</body>
</html>
