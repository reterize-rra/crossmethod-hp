<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <title>人間OS｜実施回URL試験</title>
  <style>
    :root{
      --ink:#0b2234;
      --turq:#10b6bd;
      --turq-light:#6fe3e5;
      --gold:#d3a63f;
      --os-bg:#101d31;
      --white:#f4fbff;
      --muted:#bfd4e3;
      --danger:#ffb8b8;
    }

    *{box-sizing:border-box}

    html{
      min-height:100%;
      background:#101d31;
    }

    body{
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
      color:#eaf7ff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;
      background:
        radial-gradient(circle at 74% 18%,rgba(111,227,229,.20),transparent 24%),
        radial-gradient(circle at 20% 86%,rgba(211,166,63,.10),transparent 28%),
        linear-gradient(135deg,#101d31 0%,#101d31 58%,#0b1728 100%);
    }

    button,input,textarea{font:inherit}

    .visual-layer{
      position:fixed;
      inset:0;
      z-index:0;
      overflow:hidden;
      pointer-events:none;
    }

    .visual-layer::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 74% 20%,rgba(111,227,229,.13),transparent 28%),
        radial-gradient(circle at 34% 86%,rgba(211,166,63,.08),transparent 30%);
    }

    .art-wrap{
      position:absolute;
      top:108px;
      right:3vw;
      width:min(50vw,820px);
      height:calc(100vh - 132px);
      min-height:600px;
      overflow:hidden;
      border:1px solid rgba(111,227,229,.24);
      border-radius:54px;
      background:#101d31;
      box-shadow:
        0 34px 120px rgba(0,0,0,.34),
        inset 0 0 90px rgba(111,227,229,.10);
      backdrop-filter:blur(4px);
    }

    .art-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center right;
      transform:scale(1.015);
      filter:saturate(1.04) brightness(1.08) contrast(1.02);
      opacity:0;
      visibility:hidden;
      transition:opacity .3s ease;
    }

    .art-image.ready{
      opacity:1;
      visibility:visible;
    }

    .art-fallback{
      position:absolute;
      inset:11% 20% 4%;
      opacity:.20;
    }

    .art-fallback::before{
      content:"";
      position:absolute;
      top:3%;
      left:50%;
      width:24%;
      aspect-ratio:1;
      transform:translateX(-50%);
      border:1px solid rgba(111,227,229,.62);
      border-radius:50%;
      background:radial-gradient(circle,rgba(111,227,229,.16),transparent 70%);
    }

    .art-fallback::after{
      content:"";
      position:absolute;
      top:28%;
      left:50%;
      width:56%;
      height:67%;
      transform:translateX(-50%);
      border:1px solid rgba(111,227,229,.50);
      border-radius:48% 48% 30% 30% / 22% 22% 16% 16%;
      background:linear-gradient(180deg,rgba(111,227,229,.10),rgba(111,227,229,.02));
    }

    .art-shade{
      position:absolute;
      inset:0;
      z-index:2;
      background:
        linear-gradient(90deg,rgba(16,29,49,.94) 0%,rgba(16,29,49,.54) 42%,rgba(16,29,49,.10) 100%),
        radial-gradient(circle at 58% 34%,rgba(111,227,229,.16),transparent 45%);
    }

    .os-scan{
      position:absolute;
      inset:0;
      z-index:4;
      overflow:hidden;
    }

    .os-scan::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:-8%;
      height:3px;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(111,227,229,.98),
        rgba(255,255,255,.92),
        rgba(211,166,63,.55),
        transparent
      );
      box-shadow:
        0 0 18px rgba(111,227,229,.82),
        0 0 42px rgba(111,227,229,.38);
      animation:scanDown 3.4s ease-in-out infinite;
    }

    .os-scan::after{
      content:"";
      position:absolute;
      inset:0;
      opacity:.42;
      mix-blend-mode:screen;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(16,182,189,.08) 0,
          rgba(16,182,189,.08) 1px,
          transparent 1px,
          transparent 18px
        ),
        radial-gradient(circle at 62% 40%,rgba(111,227,229,.12),transparent 34%);
      animation:scanPulse 2.6s ease-in-out infinite alternate;
    }

    @keyframes scanDown{
      0%{top:-8%;opacity:0}
      12%{opacity:1}
      72%{top:102%;opacity:1}
      100%{top:108%;opacity:0}
    }

    @keyframes scanPulse{
      from{opacity:.25}
      to{opacity:.56}
    }

    .global-header{
      position:relative;
      z-index:5;
      width:min(1420px,calc(100% - 64px));
      min-height:82px;
      margin:0 auto;
      padding-top:10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }

    .header-left{
      display:flex;
      align-items:center;
      min-width:0;
    }

    .company-logo{
      display:none;
      max-width:230px;
      max-height:50px;
      object-fit:contain;
      object-position:left center;
      filter:drop-shadow(0 5px 14px rgba(0,0,0,.20));
    }

    .company-logo.ready{display:block}

    .company-fallback{
      color:#eaf7ff;
      font-size:20px;
      font-weight:620;
      letter-spacing:.08em;
    }

    .company-fallback.hidden{display:none}

    .header-right{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:7px;
    }

    .header-tag{
      color:var(--turq);
      font-size:14px;
      font-weight:620;
      letter-spacing:.16em;
      white-space:nowrap;
    }

    .preview-badge{
      padding:5px 10px;
      border:1px solid rgba(211,166,63,.34);
      border-radius:999px;
      color:#e8d5a5;
      background:rgba(211,166,63,.06);
      font-size:10px;
      letter-spacing:.05em;
      white-space:nowrap;
    }

    .app{
      position:relative;
      z-index:3;
      width:min(1420px,calc(100% - 64px));
      margin:0 auto;
      padding:12px 0 46px;
    }

    .brand-row{
      min-height:64px;
      margin:8px 0 18px 18px;
      display:flex;
      align-items:center;
      gap:16px;
    }

    .cross-logo{
      display:none;
      width:58px;
      height:58px;
      object-fit:contain;
      filter:drop-shadow(0 6px 18px rgba(0,0,0,.24));
    }

    .cross-logo.ready{display:block}

    .cross-text{
      color:transparent;
      font-size:34px;
      font-weight:660;
      letter-spacing:.04em;
      white-space:nowrap;
      background:linear-gradient(
        90deg,
        #22c7cf 0%,
        #6bcb6d 35%,
        #f2c94c 67%,
        #2d6cdf 100%
      );
      background-clip:text;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .stage{
      position:relative;
      z-index:3;
      min-height:calc(100vh - 220px);
      padding:34px 0 36px 46px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }

    .card{
      position:relative;
      width:min(720px,calc(100% - 700px));
      min-width:560px;
      overflow:hidden;
      padding:36px 42px;
      border:1.5px solid rgba(143,235,255,.52);
      border-radius:32px;
      color:#eaf7ff;
      background:
        linear-gradient(135deg,rgba(255,255,255,.20) 0%,rgba(255,255,255,.07) 38%,rgba(111,227,229,.08) 100%),
        radial-gradient(circle at 18% 8%,rgba(111,227,229,.18),transparent 34%),
        radial-gradient(circle at 92% 94%,rgba(211,166,63,.10),transparent 34%),
        rgba(11,26,46,.64);
      box-shadow:
        0 38px 120px rgba(0,0,0,.54),
        0 0 0 1px rgba(255,255,255,.14) inset,
        0 0 0 7px rgba(111,227,229,.045),
        0 0 72px rgba(111,227,229,.16);
      backdrop-filter:blur(26px) saturate(1.38);
      -webkit-backdrop-filter:blur(26px) saturate(1.38);
      animation:fadeUp .35s ease both;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      border-radius:inherit;
      opacity:.72;
      mix-blend-mode:screen;
      background:
        linear-gradient(115deg,rgba(255,255,255,.28) 0%,rgba(255,255,255,.10) 18%,transparent 40%),
        linear-gradient(180deg,rgba(111,227,229,.16),transparent 42%);
    }

    .card::after{
      content:"";
      position:absolute;
      inset:14px;
      z-index:0;
      pointer-events:none;
      border:1px solid rgba(183,246,255,.16);
      border-radius:24px;
      opacity:.34;
      mix-blend-mode:screen;
      background:repeating-linear-gradient(
        180deg,
        rgba(111,227,229,.045) 0,
        rgba(111,227,229,.045) 1px,
        transparent 1px,
        transparent 22px
      );
    }

    .card > *{
      position:relative;
      z-index:1;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(14px)}
      to{opacity:1;transform:translateY(0)}
    }

    .pill{
      display:inline-flex;
      align-items:center;
      margin-bottom:18px;
      padding:8px 18px;
      border:1px solid rgba(111,227,229,.22);
      border-radius:999px;
      color:#bdf8ff;
      background:rgba(111,227,229,.13);
      font-size:14px;
      font-weight:620;
      letter-spacing:.04em;
    }

    h1,h2,p{margin-top:0}

    h1{
      margin-bottom:18px;
      color:#f4fbff;
      font-size:clamp(36px,4.6vw,64px);
      font-weight:640;
      line-height:1.15;
      letter-spacing:.02em;
    }

    .hero-title{
      max-width:100%;
      white-space:nowrap;
      word-break:keep-all;
      font-size:clamp(30px,4.15vw,58px);
      letter-spacing:.004em;
    }

    h2{
      margin-bottom:16px;
      color:#f4fbff;
      font-size:clamp(25px,2.6vw,38px);
      font-weight:620;
      line-height:1.25;
    }

    p{
      margin-bottom:14px;
      color:#bfd4e3;
      font-size:16px;
      font-weight:460;
      line-height:1.8;
    }

    .note{
      margin:22px 0 0;
      padding:18px 20px;
      border:1px solid rgba(111,227,229,.18);
      border-radius:22px;
      color:#d9f7ff;
      background:rgba(111,227,229,.10);
      box-shadow:0 0 40px rgba(111,227,229,.04) inset;
      font-weight:560;
      line-height:1.7;
    }

    .preview-note{
      margin:16px 0 0;
      color:#9fb7c5;
      font-size:12px;
      line-height:1.7;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:26px;
    }

    button{
      min-height:50px;
      padding:14px 24px;
      border:0;
      border-radius:999px;
      cursor:pointer;
      font-size:16px;
      font-weight:560;
      letter-spacing:.03em;
      transition:transform .14s ease,box-shadow .14s ease,opacity .14s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .btn-primary{
      color:#fff;
      background:linear-gradient(135deg,#0e8ea3,#071428);
      box-shadow:0 18px 44px rgba(111,227,229,.20);
    }

    .btn-secondary{
      color:#eaf7ff;
      border:1px solid rgba(111,227,229,.20);
      background:rgba(255,255,255,.08);
    }

    .btn-start{
      position:relative;
      isolation:isolate;
      overflow:hidden;
      animation:startButtonBreath 1.85s ease-in-out infinite;
    }

    .btn-start::after{
      content:"";
      position:absolute;
      inset:-40% -80%;
      z-index:-1;
      opacity:0;
      background:linear-gradient(105deg,transparent 32%,rgba(255,255,255,.58) 48%,transparent 64%);
      transform:translateX(-48%) rotate(8deg);
      animation:startButtonSweep 2.8s ease-in-out infinite;
    }

    @keyframes startButtonBreath{
      0%,100%{transform:scale(1);box-shadow:0 18px 35px rgba(16,182,189,.24)}
      50%{transform:scale(1.045);box-shadow:0 22px 48px rgba(16,182,189,.36)}
    }

    @keyframes startButtonSweep{
      0%,42%{transform:translateX(-58%) rotate(8deg);opacity:0}
      55%{opacity:.95}
      76%,100%{transform:translateX(58%) rotate(8deg);opacity:0}
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px 16px;
      margin-top:20px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
    }

    .field.full{grid-column:1/-1}

    label{
      color:#dcefff;
      font-size:13px;
      font-weight:560;
      letter-spacing:.02em;
    }

    input,textarea{
      width:100%;
      min-height:48px;
      padding:13px 14px;
      border:1px solid rgba(143,235,255,.42);
      border-radius:15px;
      outline:none;
      color:#f4fbff;
      background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.075));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 12px 28px rgba(0,0,0,.16);
      backdrop-filter:blur(10px);
    }

    input::placeholder,textarea::placeholder{color:rgba(220,239,255,.55)}

    input:focus,textarea:focus{
      border-color:#6fe3e5;
      box-shadow:0 0 0 4px rgba(111,227,229,.12);
    }

    textarea{
      min-height:140px;
      resize:vertical;
      line-height:1.7;
    }

    .progress-wrap{
      width:min(720px,calc(100% - 700px));
      min-width:560px;
      margin-bottom:14px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      gap:16px;
      margin-bottom:9px;
      color:#bfd4e3;
      font-size:12px;
    }

    .progress{
      height:4px;
      overflow:hidden;
      border-radius:999px;
      background:rgba(255,255,255,.10);
    }

    .bar{
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg,#6fe3e5,#d3a63f);
      transition:width .25s ease;
    }

    .question-camera-anchor{
      scroll-margin-top:24px;
    }

    .question-view .card{
      animation:questionFade .20s ease both;
    }

    @keyframes questionFade{
      from{opacity:.68}
      to{opacity:1}
    }

    .question-number{
      margin-bottom:15px;
      color:#d3a63f;
      font-size:12px;
      letter-spacing:.14em;
    }

    .q-text{
      margin-bottom:25px;
      color:#f4fbff;
      font-size:clamp(22px,2.35vw,34px);
      line-height:1.55;
    }

    .choice-list{
      display:grid;
      gap:10px;
    }

    .choice{
      width:100%;
      min-height:54px;
      padding:13px 16px;
      display:flex;
      align-items:center;
      gap:13px;
      border:1px solid rgba(111,227,229,.22);
      border-radius:15px;
      color:#eaf7ff;
      text-align:left;
      background:rgba(255,255,255,.055);
      cursor:pointer;
      transition:transform .16s ease,border-color .16s ease,background .16s ease;
    }

    .choice:hover{
      transform:translateX(2px);
      border-color:rgba(111,227,229,.52);
    }

    .choice.selected{
      border-color:#6fe3e5;
      background:rgba(111,227,229,.13);
    }

    .choice-dot{
      width:19px;
      height:19px;
      flex:0 0 19px;
      border:1px solid rgba(111,227,229,.46);
      border-radius:50%;
      background:rgba(255,255,255,.06);
    }

    .choice.selected .choice-dot{
      border-color:#6fe3e5;
      background:#6fe3e5;
      box-shadow:inset 0 0 0 5px #101d31;
    }

    .summary{
      display:grid;
      gap:8px;
      margin-top:18px;
    }

    .summary-row{
      display:grid;
      grid-template-columns:170px 1fr;
      gap:16px;
      padding:11px 0;
      border-bottom:1px solid rgba(255,255,255,.09);
      color:#bfd4e3;
      font-size:14px;
    }

    .summary-row strong{color:#f4fbff}

    .error{
      display:none;
      margin-top:16px;
      padding:14px 16px;
      border:1px solid rgba(255,184,184,.26);
      border-radius:16px;
      color:var(--danger);
      background:rgba(120,25,25,.15);
      font-weight:620;
      line-height:1.6;
    }

    .error.show{display:block}

    .loading{
      min-height:260px;
      display:grid;
      place-items:center;
      text-align:center;
    }

    .spinner{
      width:42px;
      height:42px;
      margin:0 auto 18px;
      border:2px solid rgba(111,227,229,.16);
      border-top-color:#6fe3e5;
      border-radius:50%;
      animation:spin .9s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .run-company{
      margin:0 0 16px;
      padding:13px 16px;
      border:1px solid rgba(111,227,229,.24);
      border-radius:16px;
      color:#d9f7ff;
      background:rgba(111,227,229,.08);
      font-size:14px;
      line-height:1.65;
    }

    .note strong{
      display:inline-block;
      margin-bottom:5px;
      color:#f4fbff;
      font-size:1.08em;
    }

    .issued-url{
      width:100%;
      min-height:108px;
      margin-top:14px;
      padding:14px 16px;
      border:1px solid rgba(111,227,229,.38);
      border-radius:16px;
      color:#f4fbff;
      background:rgba(5,18,34,.62);
      overflow-wrap:anywhere;
      user-select:all;
      line-height:1.65;
    }

    .copy-status{
      min-height:22px;
      margin-top:9px;
      color:#8fe7dc;
      font-size:12px;
    }

    .save-consent{
      margin-top:18px;
      padding:15px 17px;
      display:flex;
      align-items:flex-start;
      gap:12px;
      border:1px solid rgba(211,166,63,.30);
      border-radius:16px;
      color:#e9dbb8;
      background:rgba(211,166,63,.075);
      font-size:13px;
      line-height:1.65;
      cursor:pointer;
    }

    .save-consent input{
      width:19px;
      height:19px;
      min-height:0;
      margin:2px 0 0;
      flex:0 0 19px;
      accent-color:#10b6bd;
    }

    .complete-mark{
      width:68px;
      height:68px;
      margin-bottom:22px;
      display:grid;
      place-items:center;
      border:1px solid rgba(111,227,229,.70);
      border-radius:50%;
      color:#6fe3e5;
      font-size:28px;
      box-shadow:0 0 36px rgba(111,227,229,.14);
    }

    @media (max-width:1080px){
      .global-header,.app{
        width:min(100% - 36px,900px);
      }

      .art-wrap{
        position:relative;
        top:auto;
        right:auto;
        width:calc(100% - 36px);
        height:360px;
        min-height:360px;
        margin:0 auto 18px;
        border-radius:30px;
      }

      .visual-layer{
        position:relative;
        z-index:1;
        height:auto;
      }

      .global-header{min-height:68px}
      .app{padding-top:0}

      .brand-row{
        margin:8px 0 14px;
      }

      .stage{
        min-height:auto;
        padding:0 0 28px;
      }

      .card,
      .progress-wrap{
        width:100%;
        min-width:0;
      }

      body{
        display:flex;
        flex-direction:column;
      }

      .global-header{order:1}
      .app{order:3}
      .visual-layer{order:2}
    }

    @media (max-width:640px){
      .global-header,.app{
        width:calc(100% - 28px);
      }

      .global-header{
        min-height:62px;
        padding-top:7px;
      }

      .company-logo{
        max-width:154px;
        max-height:31px;
      }

      .company-fallback{font-size:14px}
      .header-tag{font-size:10.5px}
      .preview-badge{font-size:8.5px;padding:4px 7px}

      .art-wrap{
        width:calc(100% - 28px);
        height:250px;
        min-height:250px;
        border-radius:26px;
      }

      .brand-row{
        min-height:54px;
        gap:12px;
      }

      .cross-logo{
        width:42px;
        height:42px;
      }

      .cross-text{font-size:26px}

      .card{
        padding:25px 20px;
        border-radius:25px;
      }

      .card::after{
        inset:10px;
        border-radius:19px;
      }

      .hero-title{
        white-space:normal;
        font-size:clamp(34px,11vw,48px);
      }

      h2{font-size:28px}
      p{font-size:15px}

      .form-grid{grid-template-columns:1fr}
      .field.full{grid-column:auto}
      .summary-row{grid-template-columns:1fr;gap:3px}

      .actions{
        display:grid;
        grid-template-columns:1fr;
      }

      button{width:100%}
    }

    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{
        animation:none!important;
        scroll-behavior:auto!important;
      }
    }
  </style>
</head>
<body>
  <div class="visual-layer" aria-hidden="true">
    <div class="art-wrap">
      <div id="artFallback" class="art-fallback"></div>
      <img id="humanImage" class="art-image" alt="">
      <div class="art-shade"></div>
      <div class="os-scan"></div>
    </div>
  </div>

  <header class="global-header">
    <div class="header-left">
      <img id="companyLogo" class="company-logo" alt="会社ロゴ">
      <span id="companyFallback" class="company-fallback">TSUNAGARI</span>
    </div>
    <div class="header-right">
      <div class="header-tag">Cross Method</div>
      <div class="preview-badge">動作確認中</div>
    </div>
  </header>

  <main class="app">
    <div class="brand-row">
      <img id="crossLogo" class="cross-logo" alt="クロスメソッド™ロゴ">
      <div class="cross-text">クロスメソッド™</div>
    </div>

    <section id="screen">
      <div class="stage">
        <div class="card loading">
          <div>
            <div class="spinner"></div>
            <h2>診断を準備しています</h2>
            <p>本番診断マスターから人間OSを読み込んでいます。</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_ENDPOINT = 'https://api.tsunagari-jp.com/diagnosis.php';

    const state = {
      runtime:null,
      questions:[],
      choices:[],
      answers:{},
      basic:{
        company_name:'',
        respondent_name:'',
        job_department:''
      },
      currentIndex:0,
      clientRegistrationId:createSubmissionId(),
      clientSubmissionId:createSubmissionId(),
      runToken:getRunTokenFromUrl(),
      run:null,
      saveResult:null,
      submitting:false
    };

    boot();

    async function boot(){
      try{
        const response = await fetch(API_ENDPOINT,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'human_os_runtime'})
        });

        const raw = await response.text();
        let data;

        try{
          data = JSON.parse(raw);
        }catch(error){
          throw new Error('APIからJSONではない応答が返りました。');
        }

        if(!response.ok || !data || !data.ok){
          throw new Error(data && data.message
            ? data.message
            : '人間OSデータを取得できませんでした。');
        }

        state.runtime = data;
        state.questions = Array.isArray(data.questions) ? data.questions : [];
        state.choices =
          data.choices &&
          Array.isArray(data.choices.scale_5_tendency)
            ? data.choices.scale_5_tendency
            : [];

        if(!state.questions.length){
          throw new Error('人間OSの設問が0件です。');
        }

        applyAssets();

        if(state.runToken){
          await resolveRunFromUrl();
        }

        renderStart();
      }catch(error){
        renderError(error && error.message
          ? error.message
          : '人間OSの読み込みに失敗しました。');
      }
    }

    async function resolveRunFromUrl(){
      const response = await fetch(API_ENDPOINT,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          action:'resolve_human_os_run_test',
          run_token:state.runToken
        })
      });

      const raw = await response.text();
      let result;

      try{
        result = JSON.parse(raw);
      }catch(error){
        throw new Error('実施回情報がJSONで返りませんでした。');
      }

      if(!response.ok || !result || !result.ok){
        throw new Error(
          result && result.message
            ? result.message
            : '実施回URLを読み込めませんでした。'
        );
      }

      state.run = result.run || null;
    }

    function applyAssets(){
      const assets =
        state.runtime && state.runtime.assets
          ? state.runtime.assets
          : {};

      const humanCandidates = uniqueValues([
        assets.human_os_scan_data_uri,
        assets.human_os_scan_url,
        assets.default_illustration_url
      ]);

      const companyLogoCandidates = uniqueValues([
        assets.company_logo_data_uri,
        assets.company_logo_url
      ]);

      const crossLogoCandidates = uniqueValues([
        assets.crossmethod_logo_data_uri,
        assets.crossmethod_logo_url
      ]);

      loadImageCandidates(
        document.getElementById('humanImage'),
        humanCandidates,
        function(img){
          img.classList.add('ready');
          const fallback = document.getElementById('artFallback');
          if(fallback) fallback.style.display = 'none';
        }
      );

      loadImageCandidates(
        document.getElementById('companyLogo'),
        companyLogoCandidates,
        function(img){
          img.classList.add('ready');
          const fallback = document.getElementById('companyFallback');
          if(fallback) fallback.classList.add('hidden');
        }
      );

      loadImageCandidates(
        document.getElementById('crossLogo'),
        crossLogoCandidates,
        function(img){
          img.classList.add('ready');
        }
      );
    }

    function uniqueValues(values){
      const result = [];

      (values || []).forEach(function(value){
        const safe = String(value || '').trim();
        if(safe && result.indexOf(safe) < 0){
          result.push(safe);
        }
      });

      return result;
    }

    function loadImageCandidates(img,candidates,onReady){
      if(!img || !Array.isArray(candidates) || !candidates.length){
        return;
      }

      let index = 0;

      const tryNext = function(){
        if(index >= candidates.length){
          img.removeAttribute('src');
          img.classList.remove('ready');
          return;
        }

        const candidate = candidates[index++];

        img.onload = function(){
          img.onload = null;
          img.onerror = null;
          if(typeof onReady === 'function'){
            onReady(img);
          }
        };

        img.onerror = function(){
          img.onload = null;
          img.onerror = null;
          tryNext();
        };

        img.src = candidate;
      };

      tryNext();
    }

    function publicCompanyName(value){
      return String(value || '')
        .replace(/^【HP実施回試験】/,'')
        .replace(/^【HP保存試験】/,'')
        .trim();
    }

    function displayTitle(){
      return (
        state.runtime &&
        state.runtime.diagnosis &&
        state.runtime.diagnosis.display_title
      ) || 'あなたの人間OS';
    }

    function screenHtml(html,cameraMode){
      const screen = document.getElementById('screen');
      screen.innerHTML = html;

      if(!cameraMode || cameraMode === 'keep'){
        return;
      }

      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          moveCamera(cameraMode);
        });
      });
    }

    function moveCamera(cameraMode){
      let target = null;

      if(cameraMode === 'question'){
        target = document.getElementById('questionCameraAnchor');
      }else if(cameraMode === 'screen'){
        target = document.getElementById('screen');
      }

      if(!target){
        return;
      }

      const reducedMotion = window.matchMedia(
        '(prefers-reduced-motion: reduce)'
      ).matches;

      const mobile = window.matchMedia('(max-width: 1080px)').matches;
      const offset = mobile ? 14 : 22;
      const top =
        target.getBoundingClientRect().top +
        window.pageYOffset -
        offset;

      window.scrollTo({
        top:Math.max(0,top),
        behavior:reducedMotion ? 'auto' : 'smooth'
      });
    }

    function renderStart(){
      const runInfo = state.run
        ? `
          <div class="run-company">
            <strong>${escapeHtml(publicCompanyName(state.run.company_name || ''))}</strong>
          </div>
        `
        : '';

      screenHtml(`
        <div class="stage">
          <div class="card">
            <div class="pill">Human OS｜内面構造の確認</div>
            <h1 class="hero-title">${escapeHtml(displayTitle())}</h1>
            ${runInfo}
            <p>
              この診断は、あなたの考え方・反応・行動の傾向を整理するためのものです。
              正解や不正解はありません。
            </p>
            <div class="note">
              回答は、あなた自身の傾向を理解するための材料として扱います。
              誰かと比べるものではありません。
            </div>
            <div class="actions">
              <button class="btn-primary btn-start" type="button" onclick="renderBasic()">はじめる</button>
            </div>
            <div class="preview-note">
              画面の動作確認中です。入力内容は診断の確認にのみ使用します。
            </div>
          </div>
        </div>
      `,'screen');
    }

    function renderBasic(){
      const companyBlock = state.run
        ? `
          <div class="run-company">
            会社・事業所：
            <strong>${escapeHtml(publicCompanyName(state.run.company_name || ''))}</strong>
          </div>
        `
        : `
          <div class="field full">
            <label for="companyName">会社名・店舗名・事業所名</label>
            <input
              id="companyName"
              type="text"
              value="${escapeAttr(state.basic.company_name)}"
              placeholder="例：株式会社〇〇">
          </div>
        `;

      screenHtml(`
        <div class="stage">
          <div class="card">
            <div class="pill">基本情報</div>
            <h2>${state.run ? 'お名前を入力してください' : '会社情報を入力してください'}</h2>
            <p>
              ${state.run
                ? '会社情報は専用URLから読み込まれています。'
                : 'はじめに、会社名とお名前を入力してください。'}
            </p>

            ${companyBlock}

            <div class="form-grid">
              <div class="field">
                <label for="personName">お名前</label>
                <input
                  id="personName"
                  type="text"
                  value="${escapeAttr(state.basic.respondent_name)}"
                  placeholder="入力してください">
              </div>

              <div class="field">
                <label for="department">職種・部署 任意</label>
                <input
                  id="department"
                  type="text"
                  value="${escapeAttr(state.basic.job_department)}"
                  placeholder="例：介護職 / 営業 / 管理部門">
              </div>
            </div>

            ${state.run ? '' : `
              <div class="note">
                入力後、ほかの方にも共有できる会社専用の診断URLが表示されます。
              </div>
            `}

            <div id="basicError" class="error"></div>

            <div class="actions">
              <button class="btn-secondary" type="button" onclick="renderStart()">戻る</button>
              <button id="basicNextButton" class="btn-primary" type="button" onclick="saveBasic()">
                ${state.run ? '設問へ進む' : '次へ'}
              </button>
            </div>
          </div>
        </div>
      `,'screen');
    }

    async function saveBasic(){
      const companyName = state.run
        ? String(state.run.company_name || '').trim()
        : valueOf('companyName');
      const personName = valueOf('personName');
      const department = valueOf('department');

      if(!companyName || !personName){
        showError('basicError','会社名とお名前を入力してください。');
        return;
      }

      state.basic = {
        company_name:companyName,
        respondent_name:personName,
        job_department:department
      };

      if(state.run){
        renderQuestion(0);
        return;
      }

      const button = document.getElementById('basicNextButton');
      if(button){
        button.disabled = true;
        button.textContent = 'URL発行中...';
      }

      try{
        const response = await fetch(API_ENDPOINT,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            action:'prepare_human_os_run_test',
            test_mode:'human_os_run_url_test_v1',
            client_registration_id:state.clientRegistrationId,
            run_name:'',
            company:{
              company_name:companyName,
              respondent_name:personName,
              job_department:department
            }
          })
        });

        const raw = await response.text();
        let result;

        try{
          result = JSON.parse(raw);
        }catch(error){
          throw new Error('URL発行APIからJSONではない応答が返りました。');
        }

        if(!response.ok || !result || !result.ok){
          throw new Error(
            result && result.message
              ? result.message
              : '専用URLを発行できませんでした。'
          );
        }

        state.run = result.run || null;

        if(!state.run || !state.run.public_url){
          throw new Error('発行された専用URLを確認できません。');
        }

        state.runToken = getRunTokenFromUrl(state.run.public_url);
        renderRunIssued();
      }catch(error){
        if(button){
          button.disabled = false;
          button.textContent = '次へ';
        }

        showError(
          'basicError',
          error && error.message
            ? error.message
            : '専用URLの発行に失敗しました。'
        );
      }
    }

    function renderRunIssued(){
      screenHtml(`
        <div class="stage">
          <div class="card">
            <div class="pill">診断URLのご案内</div>
            <h2>会社専用の診断URLを発行しました</h2>

            <div class="run-company">
              会社・事業所：
              <strong>${escapeHtml(publicCompanyName(state.run.company_name || ''))}</strong>
            </div>

            <div class="note">
              <strong>2人目以降の方へ</strong><br>
              下のURLをそのまま共有してください。<br>
              URLを受け取った方は、会社名を入力せずに診断を始められます。
            </div>

            <div id="issuedUrl" class="issued-url">${escapeHtml(state.run.public_url || '')}</div>
            <div id="copyStatus" class="copy-status"></div>

            <div class="actions">
              <button class="btn-secondary" type="button" onclick="copyIssuedUrl()">
                URLをコピーする
              </button>
              <button class="btn-primary" type="button" onclick="renderQuestion(0)">
                この画面から診断へ進む
              </button>
            </div>

            <div class="preview-note">
              1人目の方は、この画面からそのまま進めます。
              発行されたURLを開き直す必要はありません。
            </div>
          </div>
        </div>
      `,'screen');
    }

    async function copyIssuedUrl(){
      const url = String(state.run && state.run.public_url || '').trim();
      const status = document.getElementById('copyStatus');

      if(!url){
        if(status) status.textContent = 'コピーするURLがありません。';
        return;
      }

      try{
        await navigator.clipboard.writeText(url);
        if(status) status.textContent = 'URLをコピーしました。';
      }catch(error){
        if(status){
          status.textContent =
            '自動コピーできないため、URLを選択してコピーしてください。';
        }
      }
    }

    function renderQuestion(index){
      state.currentIndex = Math.max(
        0,
        Math.min(index,state.questions.length - 1)
      );

      const question = state.questions[state.currentIndex];
      const current = state.currentIndex + 1;
      const total = state.questions.length;
      const percent = Math.round(current / total * 100);
      const existing = state.answers[question.question_id];

      let answerHtml = '';

      if(
        question.answer_type === 'textarea' ||
        question.answer_type === 'text'
      ){
        answerHtml = `
          <textarea
            id="freeAnswer"
            placeholder="感じていること、伝えたいことを入力してください。">${escapeHtml(existing ? existing.answer_text || '' : '')}</textarea>
        `;
      }else{
        answerHtml = `
          <div class="choice-list">
            ${state.choices.map(function(choice){
              const selected =
                existing &&
                String(existing.answer_value) === String(choice.value);

              return `
                <button
                  class="choice ${selected ? 'selected' : ''}"
                  type="button"
                  data-choice-value="${escapeAttr(choice.value)}"
                  aria-pressed="${selected ? 'true' : 'false'}"
                  onclick="selectChoice(
                    '${escapeAttr(question.question_id)}',
                    '${escapeAttr(choice.value)}',
                    '${escapeAttr(choice.label)}',
                    this
                  )">
                  <span class="choice-dot"></span>
                  <span>${escapeHtml(choice.label)}</span>
                </button>
              `;
            }).join('')}
          </div>
        `;
      }

      screenHtml(`
        <div class="stage question-view">
          <div id="questionCameraAnchor" class="question-camera-anchor">
            <div class="progress-wrap">
              <div class="progress-meta">
                <span>${current} / ${total}</span>
                <span>${escapeHtml(displayTitle())}</span>
              </div>
              <div class="progress">
                <div class="bar" style="width:${percent}%"></div>
              </div>
            </div>

            <div class="card">
              <div class="question-number">QUESTION ${String(current).padStart(2,'0')}</div>
              <h2 class="q-text">${escapeHtml(question.question_text || '')}</h2>

              ${answerHtml}

              <div id="questionError" class="error"></div>

              <div class="actions">
                <button class="btn-secondary" type="button" onclick="previousQuestion()">戻る</button>
                <button class="btn-primary" type="button" onclick="nextQuestion()">
                  ${current === total ? '確認へ進む' : '次へ'}
                </button>
              </div>
            </div>
          </div>
        </div>
      `,'question');
    }

    function selectChoice(questionId,value,label,clickedButton){
      const question = state.questions[state.currentIndex];

      state.answers[questionId] = {
        question_id:questionId,
        answer_value:value,
        answer_text:label,
        answer_type:question.answer_type
      };

      document.querySelectorAll('.choice').forEach(function(button){
        const selected =
          button === clickedButton ||
          String(button.dataset.choiceValue || '') === String(value);

        button.classList.toggle('selected',selected);
        button.setAttribute('aria-pressed',selected ? 'true' : 'false');
      });

      const error = document.getElementById('questionError');
      if(error){
        error.textContent = '';
        error.classList.remove('show');
      }
    }

    function nextQuestion(){
      const question = state.questions[state.currentIndex];

      if(
        question.answer_type === 'textarea' ||
        question.answer_type === 'text'
      ){
        const text = valueOf('freeAnswer');

        if(!text && question.is_required){
          showError('questionError','入力してください。');
          return;
        }

        state.answers[question.question_id] = {
          question_id:question.question_id,
          answer_value:'',
          answer_text:text,
          answer_type:question.answer_type
        };
      }else if(!state.answers[question.question_id]){
        showError('questionError','この設問に回答してください。');
        return;
      }

      if(state.currentIndex >= state.questions.length - 1){
        renderConfirm();
      }else{
        renderQuestion(state.currentIndex + 1);
      }
    }

    function previousQuestion(){
      if(state.currentIndex <= 0){
        renderBasic();
      }else{
        renderQuestion(state.currentIndex - 1);
      }
    }

    function renderConfirm(){
      const answered = Object.keys(state.answers).length;

      screenHtml(`
        <div class="stage">
          <div class="card">
            <div class="pill">保存前確認</div>
            <h2>テスト回答を保存します</h2>
            <p>
              会社専用の診断URLに紐づけて回答を保存します。
              集計・レポート・PDFはまだ実行しません。
            </p>

            <div class="summary">
              ${summaryRow('診断',displayTitle())}
              ${summaryRow(
                '会社・事業所',
                publicCompanyName(state.run ? state.run.company_name : state.basic.company_name)
              )}
              ${summaryRow('お名前',state.basic.respondent_name)}
              ${state.basic.job_department
                ? summaryRow('職種・部署',state.basic.job_department)
                : ''}
              ${summaryRow('回答数',answered + ' / ' + state.questions.length)}
            </div>

            <label class="save-consent">
              <input id="saveConsent" type="checkbox">
              <span>
                会社専用の診断URLに紐づく回答として
                保存されることを確認しました。
              </span>
            </label>

            <div id="submitError" class="error"></div>

            <div class="actions">
              <button
                class="btn-secondary"
                type="button"
                onclick="renderQuestion(${Math.max(state.questions.length - 1,0)})">
                回答を修正する
              </button>
              <button
                id="submitButton"
                class="btn-primary"
                type="button"
                onclick="submitRunTest()">
                回答を送信する
              </button>
            </div>
          </div>
        </div>
      `,'screen');
    }

    async function submitRunTest(){
      if(state.submitting){
        return;
      }

      if(!state.runToken || !state.run){
        showError('submitError','診断URLを確認できません。');
        return;
      }

      const consent = document.getElementById('saveConsent');
      if(!consent || !consent.checked){
        showError(
          'submitError',
          '回答の送信確認にチェックを入れてください。'
        );
        return;
      }

      const answers = state.questions
        .map(function(question){
          return state.answers[question.question_id];
        })
        .filter(Boolean);

      if(answers.length !== state.questions.length){
        showError(
          'submitError',
          '未回答の設問があります。回答を確認してください。'
        );
        return;
      }

      state.submitting = true;
      const button = document.getElementById('submitButton');

      if(button){
        button.disabled = true;
        button.textContent = '保存中...';
      }

      try{
        const response = await fetch(API_ENDPOINT,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            action:'submit_human_os_run_test',
            test_mode:'human_os_run_url_test_v1',
            run_token:state.runToken,
            client_submission_id:state.clientSubmissionId,
            submitted_client_at:new Date().toISOString(),
            respondent:{
              respondent_name:state.basic.respondent_name,
              job_department:state.basic.job_department
            },
            answers:answers
          })
        });

        const raw = await response.text();
        let result;

        try{
          result = JSON.parse(raw);
        }catch(error){
          throw new Error('保存APIからJSONではない応答が返りました。');
        }

        if(!response.ok || !result || !result.ok){
          throw new Error(
            result && result.message
              ? result.message
              : '回答を送信できませんでした。'
          );
        }

        state.saveResult = result;
        renderSavedComplete(result);
      }catch(error){
        state.submitting = false;

        if(button){
          button.disabled = false;
          button.textContent = '回答を送信する';
        }

        showError(
          'submitError',
          error && error.message
            ? error.message
            : '保存時に通信エラーが発生しました。'
        );
      }
    }

    function renderSavedComplete(result){
      state.submitting = false;

      screenHtml(`
        <div class="stage">
          <div class="card">
            <div class="complete-mark">✓</div>
            <div class="pill">回答完了</div>
            <h2>ご回答ありがとうございました</h2>
            <p>
              回答を受け付けました。
              この画面を閉じて終了してください。
            </p>

            <div class="note">
              ご回答は、組織の状態を確認し、
              今後のよりよい環境づくりへ活かすために取り扱います。
            </div>
          </div>
        </div>
      `,'screen');
    }

    function resetPreview(){
      state.answers = {};
      state.currentIndex = 0;
      state.clientRegistrationId = createSubmissionId();
      state.clientSubmissionId = createSubmissionId();
      state.runToken = getRunTokenFromUrl();
      state.run = null;
      state.saveResult = null;
      state.submitting = false;
      renderStart();
    }

    function renderError(message){
      screenHtml(`
        <div class="stage">
          <div class="card">
            <div class="pill">接続エラー</div>
            <h2>人間OSを表示できません</h2>
            <div class="error show">${escapeHtml(message)}</div>
            <div class="actions">
              <button class="btn-primary" type="button" onclick="location.reload()">
                再読み込み
              </button>
            </div>
          </div>
        </div>
      `,'screen');
    }

    function valueOf(id){
      const element = document.getElementById(id);
      return element ? String(element.value || '').trim() : '';
    }

    function showError(id,message){
      const element = document.getElementById(id);

      if(!element){
        return;
      }

      element.textContent = message;
      element.classList.add('show');
    }

    function summaryRow(label,value){
      return `
        <div class="summary-row">
          <strong>${escapeHtml(label)}</strong>
          <span>${escapeHtml(value)}</span>
        </div>
      `;
    }

    function getRunTokenFromUrl(url){
      try{
        const target = url
          ? new URL(url,window.location.href)
          : new URL(window.location.href);

        return String(target.searchParams.get('run') || '').trim();
      }catch(error){
        return '';
      }
    }

    function createSubmissionId(){
      if(
        window.crypto &&
        typeof window.crypto.randomUUID === 'function'
      ){
        return window.crypto.randomUUID();
      }

      return [
        Date.now().toString(36),
        Math.random().toString(36).slice(2),
        Math.random().toString(36).slice(2)
      ].join('_');
    }

    function escapeHtml(value){
      return String(value == null ? '' : value)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function escapeAttr(value){
      return escapeHtml(value).replace(/`/g,'&#96;');
    }
  </script>
</body>
</html>
