<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <title>人間OS｜ページ移動</title>
  <script>
    (function(){
      var destination =
        'https://www.tsunagari-jp.com/diagnosis/human-os/' +
        window.location.search +
        window.location.hash;
      window.location.replace(destination);
    })();
  </script>
</head>
<body>
  <p>人間OS診断ページへ移動しています。</p>
  <p>
    <a id="moveLink" href="https://www.tsunagari-jp.com/diagnosis/human-os/">
      移動しない場合はこちら
    </a>
  </p>
  <script>
    document.getElementById('moveLink').href =
      'https://www.tsunagari-jp.com/diagnosis/human-os/' +
      window.location.search +
      window.location.hash;
  </script>
</body>
</html>
