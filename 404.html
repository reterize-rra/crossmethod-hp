  <style>
    :root{--navy:#0b2840;--turquoise:#10b6bd;--gold:#d3a63f;--paper:#fff}
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;

    .card{
      width:min(760px,100%);padding:48px 34px;border-radius:30px;text-align:center;

    .brand{display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:20px}
    .brand img{width:54px;height:54px;object-fit:contain}
    .brand strong{
      font-size:clamp(22px,4vw,34px);
      background:linear-gradient(90deg,#0875c1,#10b6bd,#54bd47,#d3a63f);
      -webkit-background-clip:text;background-clip:text;color:transparent
    }
    .code{font-size:clamp(54px,13vw,104px);font-weight:900;line-height:1;margin:6px 0 18px}
    h1{font-size:clamp(24px,5vw,38px);margin:0 0 14px}
    p{margin:0 auto 26px;max-width:560px;line-height:1.8;color:#526978}
    .actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 22px;border-radius:999px;text-decoration:none;font-weight:700}
    .primary{color:#fff;background:linear-gradient(135deg,#10b6bd,#078b94)}
    .secondary{color:var(--navy);background:#eef8f8;border:1px solid #d3eaec}

    <div class="actions">
