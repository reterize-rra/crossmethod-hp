<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <title>人間OS｜表示試験</title>
  <style>
    :root{
      --navy:#071524;
      --navy2:#0c2138;
      --glass:rgba(9,31,50,.72);
      --glass-strong:rgba(8,27,45,.90);
      --line:rgba(119,231,228,.34);
      --line-strong:rgba(119,231,228,.72);
      --turquoise:#79e7e4;
      --turquoise-soft:#baf4f0;
      --gold:#d9c48f;
      --white:#f6fbff;
      --muted:#a8bdca;
      --danger:#ffb8b8;
      --shadow:0 30px 90px rgba(0,0,0,.38);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html{min-height:100%;background:var(--navy)}
    body{
      margin:0;
      min-height:100vh;
      color:var(--white);
      background:
        radial-gradient(circle at 75% 22%, rgba(57,198,202,.18), transparent 32%),
        radial-gradient(circle at 25% 82%, rgba(217,196,143,.08), transparent 28%),
        linear-gradient(145deg,var(--navy),var(--navy2));
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
      overflow-x:hidden;
    }

    button,input,textarea{font:inherit}

    .noise{
      position:fixed;inset:0;pointer-events:none;opacity:.19;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.014) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),transparent 94%);
    }

    .shell{
      width:min(1480px,100%);
      min-height:100vh;
      margin:0 auto;
      padding:22px clamp(18px,4vw,58px) 36px;
      position:relative;
      z-index:1;
    }

    .topbar{
      min-height:62px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      border-bottom:1px solid rgba(121,231,228,.18);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand img{
      max-width:190px;
      max-height:42px;
      object-fit:contain;
      display:none;
      filter:drop-shadow(0 5px 14px rgba(0,0,0,.2));
    }

    .brand img.ready{display:block}

    .brand-fallback{
      font-size:15px;
      letter-spacing:.14em;
      color:var(--turquoise-soft);
      white-space:nowrap;
    }

    .test-badge{
      padding:8px 13px;
      border:1px solid rgba(217,196,143,.48);
      border-radius:999px;
      color:#f1deb0;
      background:rgba(217,196,143,.08);
      font-size:12px;
      letter-spacing:.08em;
      white-space:nowrap;
    }

    .layout{
      min-height:calc(100vh - 120px);
      display:grid;
      grid-template-columns:minmax(0,1.08fr) minmax(390px,.92fr);
      gap:clamp(26px,5vw,86px);
      align-items:center;
      padding:34px 0 18px;
    }

    .content{min-width:0}

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-bottom:18px;
      color:var(--turquoise);
      font-size:13px;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .eyebrow::before{
      content:"";
      width:36px;height:1px;background:var(--line-strong);
    }

    h1,h2,p{margin-top:0}

    h1{
      margin-bottom:18px;
      font-size:clamp(38px,5vw,72px);
      line-height:1.12;
      letter-spacing:.02em;
      font-weight:680;
    }

    h2{
      margin-bottom:18px;
      font-size:clamp(27px,3vw,44px);
      line-height:1.35;
      font-weight:650;
    }

    .lead{
      max-width:730px;
      margin-bottom:25px;
      color:#c9d8e1;
      font-size:clamp(15px,1.55vw,19px);
      line-height:2;
    }

    .notice{
      max-width:730px;
      margin:22px 0 0;
      padding:17px 20px;
      border-left:2px solid var(--gold);
      background:rgba(217,196,143,.06);
      color:#d8d5c7;
      font-size:13px;
      line-height:1.8;
    }

    .card{
      max-width:780px;
      padding:clamp(24px,3.4vw,44px);
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(145deg,rgba(11,38,60,.83),rgba(6,25,42,.72));
      box-shadow:var(--shadow);
      backdrop-filter:blur(20px);
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:24px;
    }

    .field.full{grid-column:1/-1}

    label{
      display:block;
      margin-bottom:8px;
      color:#d8e8ef;
      font-size:13px;
      font-weight:600;
    }

    input,textarea{
      width:100%;
      border:1px solid rgba(121,231,228,.25);
      border-radius:14px;
      padding:15px 16px;
      color:var(--white);
      background:rgba(3,17,29,.56);
      outline:none;
      transition:border-color .2s,box-shadow .2s;
    }

    input:focus,textarea:focus{
      border-color:var(--turquoise);
      box-shadow:0 0 0 4px rgba(121,231,228,.10);
    }

    textarea{min-height:150px;resize:vertical;line-height:1.75}

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:28px;
    }

    .btn{
      min-height:52px;
      border:0;
      border-radius:999px;
      padding:13px 25px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.03em;
      transition:transform .18s,filter .18s,opacity .18s;
    }

    .btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
    .btn:disabled{cursor:not-allowed;opacity:.45;transform:none}

    .btn-primary{
      color:#061721;
      background:linear-gradient(135deg,#b8f6f2,#63d8d7);
      box-shadow:0 14px 34px rgba(65,211,211,.18);
    }

    .btn-secondary{
      color:#d9e9ee;
      border:1px solid rgba(180,224,229,.24);
      background:rgba(255,255,255,.04);
    }

    .visual{
      position:relative;
      min-height:650px;
      display:grid;
      place-items:center;
    }

    .glass-box{
      position:relative;
      width:min(470px,100%);
      aspect-ratio:.73;
      overflow:hidden;
      border:1px solid rgba(127,236,235,.40);
      border-radius:42px;
      background:
        radial-gradient(circle at 50% 32%,rgba(121,231,228,.18),transparent 38%),
        linear-gradient(180deg,rgba(29,74,96,.22),rgba(4,19,33,.68));
      box-shadow:
        inset 0 0 80px rgba(83,221,219,.10),
        0 35px 100px rgba(0,0,0,.42);
    }

    .glass-box::before,
    .glass-box::after{
      content:"";
      position:absolute;
      z-index:4;
      width:42px;height:42px;
      border-color:rgba(217,196,143,.70);
      pointer-events:none;
    }

    .glass-box::before{
      top:18px;left:18px;border-top:1px solid;border-left:1px solid;
    }

    .glass-box::after{
      right:18px;bottom:18px;border-right:1px solid;border-bottom:1px solid;
    }

    .human-image{
      position:absolute;
      inset:6% 3% 1%;
      width:94%;height:93%;
      object-fit:contain;
      object-position:center bottom;
      opacity:.93;
      filter:saturate(.92) contrast(1.04) drop-shadow(0 25px 35px rgba(0,0,0,.22));
    }

    .scan-line{
      position:absolute;
      z-index:3;
      left:5%;right:5%;
      height:2px;
      top:10%;
      background:linear-gradient(90deg,transparent,var(--turquoise),#fff,var(--turquoise),transparent);
      box-shadow:0 0 18px rgba(121,231,228,.95),0 0 42px rgba(121,231,228,.42);
      animation:scan 4.6s ease-in-out infinite;
    }

    .scan-glow{
      position:absolute;
      z-index:2;
      left:6%;right:6%;
      height:90px;
      top:0;
      background:linear-gradient(to bottom,transparent,rgba(121,231,228,.10),transparent);
      animation:scanGlow 4.6s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes scan{
      0%,7%{top:8%;opacity:0}
      14%{opacity:1}
      86%{opacity:1}
      93%,100%{top:89%;opacity:0}
    }

    @keyframes scanGlow{
      0%,7%{top:-3%;opacity:0}
      15%{opacity:1}
      88%{opacity:1}
      95%,100%{top:83%;opacity:0}
    }

    .visual-label{
      position:absolute;
      z-index:5;
      left:24px;bottom:25px;
      color:rgba(214,246,246,.72);
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .visual-orbit{
      position:absolute;
      width:116%;aspect-ratio:1;
      border:1px solid rgba(121,231,228,.11);
      border-radius:50%;
      animation:rotate 28s linear infinite;
      pointer-events:none;
    }

    .visual-orbit::before{
      content:"";
      position:absolute;
      width:8px;height:8px;
      top:9%;left:31%;
      border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 16px rgba(217,196,143,.8);
    }

    @keyframes rotate{to{transform:rotate(360deg)}}

    .progress-wrap{
      max-width:780px;
      margin-bottom:20px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      gap:16px;
      margin-bottom:9px;
      color:#abc5cf;
      font-size:12px;
      letter-spacing:.04em;
    }

    .progress{
      height:4px;
      overflow:hidden;
      border-radius:999px;
      background:rgba(255,255,255,.09);
    }

    .progress-bar{
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg,var(--turquoise),var(--gold));
      box-shadow:0 0 18px rgba(121,231,228,.48);
      transition:width .32s ease;
    }

    .question-number{
      margin-bottom:16px;
      color:var(--gold);
      font-size:12px;
      letter-spacing:.15em;
    }

    .question-text{
      margin-bottom:26px;
      font-size:clamp(22px,2.4vw,34px);
      line-height:1.55;
    }

    .choices{
      display:grid;
      gap:10px;
    }

    .choice{
      width:100%;
      min-height:55px;
      display:flex;
      align-items:center;
      gap:13px;
      padding:13px 16px;
      border:1px solid rgba(121,231,228,.18);
      border-radius:15px;
      color:#dceaf0;
      text-align:left;
      cursor:pointer;
      background:rgba(4,20,34,.44);
      transition:border-color .18s,background .18s,transform .18s;
    }

    .choice:hover{
      transform:translateX(2px);
      border-color:rgba(121,231,228,.52);
      background:rgba(24,67,84,.35);
    }

    .choice.selected{
      border-color:var(--turquoise);
      background:rgba(64,198,199,.14);
      box-shadow:inset 0 0 28px rgba(83,219,218,.08);
    }

    .dot{
      width:18px;height:18px;
      flex:0 0 18px;
      border:1px solid rgba(197,236,238,.55);
      border-radius:50%;
      display:grid;
      place-items:center;
    }

    .choice.selected .dot::after{
      content:"";
      width:9px;height:9px;border-radius:50%;
      background:var(--turquoise);
      box-shadow:0 0 12px rgba(121,231,228,.8);
    }

    .error{
      display:none;
      margin-top:18px;
      padding:12px 14px;
      border:1px solid rgba(255,150,150,.28);
      border-radius:12px;
      color:var(--danger);
      background:rgba(120,25,25,.12);
      font-size:13px;
    }

    .error.show{display:block}

    .summary{
      display:grid;
      gap:9px;
      margin-top:22px;
    }

    .summary-row{
      display:grid;
      grid-template-columns:190px 1fr;
      gap:16px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
      color:#cbdde5;
      font-size:14px;
    }

    .summary-row strong{color:#f1f8fb}

    .complete-mark{
      width:68px;height:68px;
      display:grid;place-items:center;
      margin-bottom:22px;
      border:1px solid var(--line-strong);
      border-radius:50%;
      color:var(--turquoise);
      font-size:28px;
      box-shadow:0 0 36px rgba(121,231,228,.14);
    }

    .loading{
      min-height:280px;
      display:grid;
      place-items:center;
      text-align:center;
    }

    .spinner{
      width:42px;height:42px;
      margin:0 auto 18px;
      border:2px solid rgba(121,231,228,.16);
      border-top-color:var(--turquoise);
      border-radius:50%;
      animation:spin .9s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    @media (max-width:920px){
      .shell{padding:16px 18px 28px}
      .topbar{min-height:56px}
      .layout{
        display:flex;
        flex-direction:column;
        min-height:auto;
        gap:22px;
        padding:24px 0 0;
      }
      .content{width:100%;order:2}
      .visual{
        width:100%;
        min-height:330px;
        order:1;
      }
      .glass-box{
        width:min(320px,82vw);
        border-radius:30px;
      }
      h1{font-size:clamp(36px,10vw,54px)}
      .card{padding:24px 19px;border-radius:22px}
      .form-grid{grid-template-columns:1fr}
      .field.full{grid-column:auto}
      .actions{display:grid;grid-template-columns:1fr 1fr}
      .actions .btn:only-child{grid-column:1/-1}
      .summary-row{grid-template-columns:1fr;gap:4px}
      .test-badge{font-size:10px;padding:7px 10px}
    }

    @media (max-width:520px){
      .brand img{max-width:142px;max-height:35px}
      .brand-fallback{font-size:12px}
      .visual{min-height:284px}
      .glass-box{width:min(270px,80vw)}
      .lead{line-height:1.8}
      .actions{grid-template-columns:1fr}
      .btn{width:100%}
      .question-text{font-size:22px}
      .choice{min-height:53px;padding:12px 13px}
    }

    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;scroll-behavior:auto!important}
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img id="crossLogo" alt="クロスメソッド™">
        <span id="brandFallback" class="brand-fallback">CROSS METHOD™</span>
      </div>
      <div class="test-badge">表示試験｜回答は保存されません</div>
    </header>

    <main class="layout">
      <section id="content" class="content" aria-live="polite">
        <div class="card loading">
          <div>
            <div class="spinner"></div>
            <h2>人間OSを準備しています</h2>
            <p class="lead">本番診断マスターから設問を読み込んでいます。</p>
          </div>
        </div>
      </section>

      <aside class="visual" aria-hidden="true">
        <div class="visual-orbit"></div>
        <div class="glass-box">
          <img id="humanImage" class="human-image" alt="">
          <div class="scan-glow"></div>
          <div class="scan-line"></div>
          <div class="visual-label">HUMAN OS / INTERNAL SCAN</div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const API_ENDPOINT = 'https://api.tsunagari-jp.com/diagnosis.php';

    const state = {
      runtime:null,
      questions:[],
      choices:[],
      answers:{},
      basic:{company_name:'',respondent_name:'',job_department:''},
      currentIndex:0
    };

    boot();

    async function boot(){
      try{
        const response = await fetch(API_ENDPOINT,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'human_os_runtime'})
        });

        const text = await response.text();
        let data;
        try{
          data = JSON.parse(text);
        }catch(error){
          throw new Error('APIからJSONではない応答が返りました。');
        }

        if(!response.ok || !data || !data.ok){
          throw new Error(data && data.message ? data.message : '人間OSデータを取得できませんでした。');
        }

        state.runtime = data;
        state.questions = Array.isArray(data.questions) ? data.questions : [];
        state.choices = data.choices && Array.isArray(data.choices.scale_5_tendency)
          ? data.choices.scale_5_tendency
          : [];

        if(!state.questions.length){
          throw new Error('設問が0件です。');
        }

        applyAssets();
        renderStart();
      }catch(error){
        renderError(error && error.message ? error.message : '読み込みに失敗しました。');
      }
    }

    function applyAssets(){
      const assets = state.runtime && state.runtime.assets ? state.runtime.assets : {};
      const humanUrl = assets.human_os_scan_url || assets.default_illustration_url || '';
      const logoUrl = assets.crossmethod_logo_url || '';

      if(humanUrl){
        document.getElementById('humanImage').src = humanUrl;
      }

      if(logoUrl){
        const logo = document.getElementById('crossLogo');
        logo.src = logoUrl;
        logo.onload = function(){
          logo.classList.add('ready');
          document.getElementById('brandFallback').style.display = 'none';
        };
      }
    }

    function displayTitle(){
      return (
        state.runtime &&
        state.runtime.diagnosis &&
        state.runtime.diagnosis.display_title
      ) || 'あなたの人間OS';
    }

    function renderStart(){
      setContent(`
        <div class="eyebrow">Human OS Diagnosis</div>
        <h1>${escapeHtml(displayTitle())}</h1>
        <p class="lead">
          あなたの考え方・反応・行動の傾向を整理し、自分らしい力の使い方を確認する診断です。
          正解や不正解はありません。今の自分に近いものを選んでください。
        </p>
        <div class="notice">
          現在は独自ドメイン上での表示・操作試験です。
          入力した企業名・氏名・回答内容は、サーバーやスプレッドシートへ保存されません。
        </div>
        <div class="actions">
          <button class="btn btn-primary" type="button" onclick="renderBasic()">表示試験をはじめる</button>
        </div>
      `);
    }

    function renderBasic(){
      setContent(`
        <div class="card">
          <div class="eyebrow">Basic Information</div>
          <h2>基本情報を入力してください</h2>
          <p class="lead">
            本番画面の入力動作を確認するための項目です。この表示試験では外部へ送信されません。
          </p>
          <div class="form-grid">
            <div class="field full">
              <label for="companyName">会社名・店舗名・事業所名</label>
              <input id="companyName" type="text" value="${escapeAttr(state.basic.company_name)}" placeholder="例：株式会社〇〇">
            </div>
            <div class="field">
              <label for="personName">お名前</label>
              <input id="personName" type="text" value="${escapeAttr(state.basic.respondent_name)}" placeholder="入力してください">
            </div>
            <div class="field">
              <label for="department">職種・部署 任意</label>
              <input id="department" type="text" value="${escapeAttr(state.basic.job_department)}" placeholder="例：介護職 / 営業 / 管理部門">
            </div>
          </div>
          <div id="basicError" class="error"></div>
          <div class="actions">
            <button class="btn btn-secondary" type="button" onclick="renderStart()">戻る</button>
            <button class="btn btn-primary" type="button" onclick="saveBasic()">設問へ進む</button>
          </div>
        </div>
      `);
    }

    function saveBasic(){
      const companyName = valueOf('companyName');
      const personName = valueOf('personName');
      const department = valueOf('department');

      if(!companyName || !personName){
        showError('basicError','会社名とお名前を入力してください。');
        return;
      }

      state.basic = {
        company_name:companyName,
        respondent_name:personName,
        job_department:department
      };
      renderQuestion(0);
    }

    function renderQuestion(index){
      state.currentIndex = Math.max(0,Math.min(index,state.questions.length - 1));
      const q = state.questions[state.currentIndex];
      const current = state.currentIndex + 1;
      const total = state.questions.length;
      const percent = Math.round(current / total * 100);

      let answerHtml = '';
      const existing = state.answers[q.question_id];

      if(q.answer_type === 'textarea' || q.answer_type === 'text'){
        answerHtml = `
          <textarea id="freeAnswer" placeholder="感じていること、伝えたいことを入力してください。">${escapeHtml(existing ? existing.answer_text || '' : '')}</textarea>
        `;
      }else{
        answerHtml = `
          <div class="choices">
            ${state.choices.map(choice => `
              <button
                class="choice ${existing && String(existing.answer_value) === String(choice.value) ? 'selected' : ''}"
                type="button"
                onclick="selectChoice('${escapeAttr(q.question_id)}','${escapeAttr(choice.value)}','${escapeAttr(choice.label)}')">
                <span class="dot"></span>
                <span>${escapeHtml(choice.label)}</span>
              </button>
            `).join('')}
          </div>
        `;
      }

      setContent(`
        <div class="progress-wrap">
          <div class="progress-meta">
            <span>${current} / ${total}</span>
            <span>${escapeHtml(displayTitle())}</span>
          </div>
          <div class="progress"><div class="progress-bar" style="width:${percent}%"></div></div>
        </div>

        <div class="card">
          <div class="question-number">QUESTION ${String(current).padStart(2,'0')}</div>
          <h2 class="question-text">${escapeHtml(q.question_text || '')}</h2>
          ${answerHtml}
          <div id="questionError" class="error"></div>
          <div class="actions">
            <button class="btn btn-secondary" type="button" onclick="previousQuestion()">戻る</button>
            <button class="btn btn-primary" type="button" onclick="nextQuestion()">
              ${current === total ? '確認へ進む' : '次へ'}
            </button>
          </div>
        </div>
      `);
    }

    function selectChoice(questionId,value,label){
      const q = state.questions[state.currentIndex];
      state.answers[questionId] = {
        question_id:questionId,
        answer_value:value,
        answer_text:label,
        answer_type:q.answer_type
      };
      renderQuestion(state.currentIndex);
    }

    function nextQuestion(){
      const q = state.questions[state.currentIndex];

      if(q.answer_type === 'textarea' || q.answer_type === 'text'){
        const text = valueOf('freeAnswer');
        if(!text && q.is_required){
          showError('questionError','入力してください。');
          return;
        }
        state.answers[q.question_id] = {
          question_id:q.question_id,
          answer_value:'',
          answer_text:text,
          answer_type:q.answer_type
        };
      }else if(!state.answers[q.question_id]){
        showError('questionError','この設問に回答してください。');
        return;
      }

      if(state.currentIndex >= state.questions.length - 1){
        renderConfirm();
      }else{
        renderQuestion(state.currentIndex + 1);
      }
    }

    function previousQuestion(){
      if(state.currentIndex <= 0){
        renderBasic();
      }else{
        renderQuestion(state.currentIndex - 1);
      }
    }

    function renderConfirm(){
      const answered = Object.keys(state.answers).length;
      setContent(`
        <div class="card">
          <div class="eyebrow">Preview Confirmation</div>
          <h2>表示試験の確認</h2>
          <p class="lead">
            20設問の表示、選択肢、戻る・次へ、確認画面までの動作を確認できました。
          </p>
          <div class="summary">
            ${summaryRow('診断',displayTitle())}
            ${summaryRow('会社名',state.basic.company_name)}
            ${summaryRow('お名前',state.basic.respondent_name)}
            ${state.basic.job_department ? summaryRow('職種・部署',state.basic.job_department) : ''}
            ${summaryRow('回答数',answered + ' / ' + state.questions.length)}
          </div>
          <div class="notice">
            「表示試験を完了する」を押しても、回答内容は保存されません。
            次の工程で、既存の回答保存処理へ安全に接続します。
          </div>
          <div class="actions">
            <button class="btn btn-secondary" type="button" onclick="renderQuestion(${Math.max(state.questions.length - 1,0)})">回答を修正する</button>
            <button class="btn btn-primary" type="button" onclick="renderComplete()">表示試験を完了する</button>
          </div>
        </div>
      `);
    }

    function renderComplete(){
      setContent(`
        <div class="card">
          <div class="complete-mark">✓</div>
          <div class="eyebrow">Preview Complete</div>
          <h2>人間OSのHP表示試験が完了しました</h2>
          <p class="lead">
            本番診断マスターの20設問を、独自ドメイン上で読み込み、最後まで操作できています。
          </p>
          <div class="notice">
            回答保存はまだ行っていません。画面を確認後、次の工程で
            企業情報・回答データを既存スプレッドシートへ保存する処理を接続します。
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="button" onclick="resetPreview()">最初から確認する</button>
          </div>
        </div>
      `);
    }

    function resetPreview(){
      state.answers = {};
      state.currentIndex = 0;
      renderStart();
    }

    function renderError(message){
      setContent(`
        <div class="card">
          <div class="eyebrow">Connection Error</div>
          <h2>人間OSを表示できません</h2>
          <div class="error show">${escapeHtml(message)}</div>
          <div class="actions">
            <button class="btn btn-primary" type="button" onclick="location.reload()">再読み込み</button>
          </div>
        </div>
      `);
    }

    function setContent(html){
      document.getElementById('content').innerHTML = html;
      window.scrollTo({top:0,behavior:'auto'});
    }

    function showError(id,message){
      const el = document.getElementById(id);
      if(!el) return;
      el.textContent = message;
      el.classList.add('show');
    }

    function valueOf(id){
      const el = document.getElementById(id);
      return el ? String(el.value || '').trim() : '';
    }

    function summaryRow(label,value){
      return `<div class="summary-row"><strong>${escapeHtml(label)}</strong><span>${escapeHtml(value)}</span></div>`;
    }

    function escapeHtml(value){
      return String(value == null ? '' : value)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function escapeAttr(value){
      return escapeHtml(value).replace(/`/g,'&#96;');
    }
  </script>
</body>
</html>
